name: 'Generate Educational Docs'
description: 'Genererar AI-lektionsdagbok med Gemini'
inputs:
  gemini_api_key:
    required: true
  gemini_model:
    default: 'gemini-3-flash-preview'
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install google-genai
      shell: bash
    - run: python ${{ github.action_path }}/scripts/generate_docs.py
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        GEMINI_MODEL: ${{ inputs.gemini_model }}